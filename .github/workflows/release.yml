name: Release

on:
  push:
    tags:
      - "v*"

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Determine Version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" == *"-"* ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is-prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION (prerelease: $IS_PRERELEASE)"

      - name: Restore
        run: dotnet restore src/DevTools.Uno/DevTools.Uno.csproj

      - name: Build
        run: dotnet build src/DevTools.Uno/DevTools.Uno.csproj -c Release --no-restore -p:ContinuousIntegrationBuild=true

  pack:
    name: Pack Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/DevTools.Uno/DevTools.Uno.csproj

      - name: Build
        run: dotnet build src/DevTools.Uno/DevTools.Uno.csproj -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Pack
        run: |
          dotnet pack src/DevTools.Uno/DevTools.Uno.csproj \
            -c Release \
            --no-build \
            -o artifacts/packages \
            -p:ContinuousIntegrationBuild=true \
            -p:Version=${{ needs.build.outputs.version }}

      - name: Upload NuGet Packages
        uses: actions/upload-artifact@v4
        with:
          name: release-nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 90

  publish-nuget:
    name: Publish To NuGet
    runs-on: ubuntu-latest
    needs: [build, pack]
    environment: nuget
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Download NuGet Packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: packages

      - name: Publish To NuGet
        run: |
          shopt -s nullglob
          for package in packages/*.nupkg packages/*.snupkg; do
            echo "Publishing $package..."
            dotnet nuget push "$package" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, pack, publish-nuget]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download NuGet Packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DevTools.Uno v${{ needs.build.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ needs.build.outputs.is-prerelease == 'true' }}
          generate_release_notes: true
          files: |
            packages/*.nupkg
            packages/*.snupkg
